<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>面白い活動 — 公式サイト (UI Kit)</title>
<style>
@charset "UTF-8";
/* =========================================================================
   面白い活動 — Omoshiroi Katsudou
   Core design tokens: colors + typography
   ========================================================================= */

/* ---------- Fonts ----------
   SUBSTITUTED from Google Fonts — flag to user, swap for licensed files later:
   - Yuji Syuku / Yuji Mai       → 筆文字 brush display
   - Reggae One                  → thick outlined テロップ-style headline
   - Zen Kaku Gothic New         → primary sans (JP + EN)
   - DotGothic16                 → pixel / 8-bit accent (Heisei nostalgia)
   - JetBrains Mono              → code / mono
   --------------------------- */
@import url('https://fonts.googleapis.com/css2?family=Yuji+Mai&family=Yuji+Syuku&family=Reggae+One&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=DotGothic16&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  /* ---------- PALETTE ----------
     Heisei-retro × cyber-gradient. The system is a small set of saturated
     accent colors sitting on either deep ink or cream paper. Gradients are
     used sparingly, as テロップ-style ribbons and hero washes. */

  /* Core ink / paper */
  --ink:          #0E0B1F;   /* near-black with violet tint */
  --ink-soft:     #1E1A38;   /* raised surface on dark */
  --paper:        #F7F1E4;   /* warm off-white, VHS manual cream */
  --paper-soft:   #EDE5D2;   /* raised surface on cream */
  --rule:         #2B2548;   /* hairline on dark */
  --rule-paper:   #1E0F2F;   /* hairline on cream (same as ink) */

  /* Signal accents — loud, saturated, テロップ palette */
  --magenta:      #FF2E88;   /* primary hot accent */
  --cyan:         #22E8FF;   /* cool complement */
  --violet:       #9B4CFF;   /* bridge between magenta and cyan */
  --yellow:       #FFD63A;   /* highlight / warning-not-error */
  --lime:         #B6FF3C;   /* accent success */
  --orange:       #FF6A1F;   /* warm pop */
  --red:          #FF2D2D;   /* NG / error */

  /* Gradient recipes */
  --grad-hero:    linear-gradient(135deg, #9B4CFF 0%, #FF2E88 45%, #22E8FF 100%);
  --grad-ribbon:  linear-gradient(90deg, #FF2E88 0%, #9B4CFF 50%, #22E8FF 100%);
  --grad-sunset:  linear-gradient(180deg, #FFD63A 0%, #FF6A1F 60%, #FF2E88 100%);
  --grad-vhs:     linear-gradient(180deg, #0E0B1F 0%, #1E0F3D 50%, #3B0F4A 100%);

  /* Semantic (functional) */
  --fg1:          var(--ink);        /* primary text on paper */
  --fg2:          #3A2E5A;           /* secondary text on paper */
  --fg3:          #6B5E8A;           /* tertiary text on paper */
  --fg1-dark:     var(--paper);      /* primary text on ink */
  --fg2-dark:     #CDBEE8;           /* secondary on ink */
  --fg3-dark:     #8678B0;           /* tertiary on ink */
  --accent:       var(--magenta);
  --accent-cool:  var(--cyan);
  --link:         var(--magenta);
  --link-visited: var(--violet);

  /* ---------- TYPE STACKS ---------- */
  --font-brush:    'Yuji Mai', 'Yuji Syuku', 'Klee One', serif;           /* 筆文字 */
  --font-display:  'Reggae One', 'Yuji Mai', system-ui, sans-serif;        /* テロップ */
  --font-sans:     'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
  --font-pixel:    'DotGothic16', 'Courier New', monospace;                /* 8-bit accent */
  --font-mono:     'JetBrains Mono', 'SF Mono', Consolas, monospace;

  /* ---------- SCALE ---------- */
  --step--2: 0.75rem;    /* 12 — micro / caption */
  --step--1: 0.875rem;   /* 14 — small */
  --step-0:  1rem;       /* 16 — body */
  --step-1:  1.125rem;   /* 18 — body lg */
  --step-2:  1.375rem;   /* 22 — h4 */
  --step-3:  1.75rem;    /* 28 — h3 */
  --step-4:  2.5rem;     /* 40 — h2 */
  --step-5:  3.75rem;    /* 60 — h1 */
  --step-6:  5.5rem;     /* 88 — display */
  --step-7:  8rem;       /* 128 — billboard */

  /* ---------- SPACING ---------- */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;

  /* ---------- RADII ----------
     Mostly crisp. Small radii for cards, pill-radius for stamps/badges. */
  --r-0: 0;
  --r-1: 4px;
  --r-2: 8px;
  --r-3: 14px;
  --r-pill: 999px;

  /* ---------- ELEVATION ----------
     Heisei graphics don't do soft Material shadows. They do HARD offset
     drop-shadows — like printed テロップ. */
  --shadow-hard:    4px 4px 0 var(--ink);
  --shadow-hard-lg: 8px 8px 0 var(--ink);
  --shadow-cyan:    4px 4px 0 var(--cyan);
  --shadow-magenta: 4px 4px 0 var(--magenta);
  --shadow-soft:    0 2px 0 rgba(14, 11, 31, 0.15);
  --shadow-glow:    0 0 24px rgba(155, 76, 255, 0.5);

  /* Outlined text (テロップ) */
  --text-stroke-ink:  -2px -2px 0 var(--ink), 2px -2px 0 var(--ink), -2px 2px 0 var(--ink), 2px 2px 0 var(--ink), 0 -2px 0 var(--ink), 0 2px 0 var(--ink), -2px 0 0 var(--ink), 2px 0 0 var(--ink);
  --text-stroke-white: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff, -2px 0 0 #fff, 2px 0 0 #fff;
}

/* ==========================================================================
   SEMANTIC ELEMENT STYLES
   Use these directly; or compose via utility classes below.
   ========================================================================== */

html { font-family: var(--font-sans); color: var(--fg1); background: var(--paper); }

h1, .h1 {
  font-family: var(--font-display);
  font-size: var(--step-5);
  line-height: 1.05;
  letter-spacing: 0.01em;
  font-weight: 400;
}

h2, .h2 {
  font-family: var(--font-display);
  font-size: var(--step-4);
  line-height: 1.1;
  font-weight: 400;
}

h3, .h3 {
  font-family: var(--font-sans);
  font-size: var(--step-3);
  line-height: 1.2;
  font-weight: 900;
}

h4, .h4 {
  font-family: var(--font-sans);
  font-size: var(--step-2);
  line-height: 1.3;
  font-weight: 700;
}

p, .body {
  font-family: var(--font-sans);
  font-size: var(--step-0);
  line-height: 1.7;
  font-weight: 400;
  color: var(--fg1);
  text-wrap: pretty;
}

.lead {
  font-size: var(--step-1);
  line-height: 1.65;
  font-weight: 500;
}

.small, small {
  font-size: var(--step--1);
  line-height: 1.5;
  color: var(--fg2);
}

.caption {
  font-size: var(--step--2);
  line-height: 1.4;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-pixel);
  color: var(--fg3);
}

.brush {
  font-family: var(--font-brush);
  font-weight: 400;
}

.telop {
  font-family: var(--font-display);
  color: var(--yellow);
  text-shadow: var(--text-stroke-ink);
  letter-spacing: 0.02em;
  transform: skew(-6deg);
  display: inline-block;
}

.pixel {
  font-family: var(--font-pixel);
  letter-spacing: 0.05em;
}

code, kbd, pre, .mono {
  font-family: var(--font-mono);
  font-size: 0.95em;
}

a {
  color: var(--link);
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
  transition: color 120ms ease, background 120ms ease;
}

a:hover {
  color: var(--ink);
  background: var(--yellow);
}

</style>
<style>
  body { margin: 0; background: var(--paper); }
  #tweaks-panel { position: fixed; bottom: 20px; right: 20px; background: var(--paper); border: 2px solid var(--ink); border-radius: 10px; padding: 14px 16px; box-shadow: 6px 6px 0 var(--ink); z-index: 1000; display: none; font-family: var(--font-sans); min-width: 220px; }
  #tweaks-panel.on { display: block; }
  #tweaks-panel h4 { font-family: var(--font-display); font-size: 16px; margin: 0 0 10px; letter-spacing: 0.02em; }
  #tweaks-panel label { display: block; font-family: var(--font-pixel); font-size: 10px; letter-spacing: 0.15em; color: var(--fg2); margin-bottom: 6px; }
  #tweaks-panel select { font-family: var(--font-sans); font-size: 14px; padding: 6px 8px; border: 2px solid var(--ink); border-radius: 6px; background: var(--paper); width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <label>HERO VARIANT</label>
  <select id="heroVariant">
    <option value="gradient">Gradient wash</option>
    <option value="vhs">VHS dark neon</option>
    <option value="paper">Paper + brush</option>
  </select>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
function Nav() {
  return (
    <nav style={{position:'sticky',top:0,zIndex:50,background:'var(--paper)',borderBottom:'2px solid var(--ink)',boxShadow:'0 3px 0 var(--magenta)'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'14px 32px',display:'flex',alignItems:'center',gap:24}}>
        <a href="#" style={{display:'flex',alignItems:'center',gap:10,textDecoration:'none',color:'var(--ink)'}}>
          <img src="../../assets/logo-mark.svg" style={{height:38}}/>
          <div>
            <div style={{fontFamily:'var(--font-display)',fontSize:22,lineHeight:1}}>面白い活動</div>
            <div style={{fontFamily:'var(--font-pixel)',fontSize:9,letterSpacing:'0.2em',color:'var(--fg3)'}}>OMOSHIROI KATSUDOU</div>
          </div>
        </a>
        <div style={{flex:1}}/>
        <a href="#videos" style={linkStyle}>動画 / VIDEOS</a>
        <a href="#sns" style={linkStyle}>SNS</a>
        <a href="#about" style={linkStyle}>ABOUT</a>
        <a href="https://youtube.com/@omoshiroi" target="_blank" style={{...ctaStyle}}>
          <span style={{display:'inline-block',transform:'skew(6deg)'}}>SUBSCRIBE ▶</span>
        </a>
      </div>
    </nav>
  );
}

const linkStyle = {
  fontFamily:'var(--font-pixel)',fontSize:11,letterSpacing:'0.15em',
  color:'var(--ink)',textDecoration:'none',padding:'6px 4px'
};
const ctaStyle = {
  fontFamily:'var(--font-display)',fontSize:14,
  background:'var(--magenta)',color:'#fff',textShadow:'var(--text-stroke-ink)',
  padding:'10px 18px',border:'2px solid var(--ink)',borderRadius:8,
  boxShadow:'3px 3px 0 var(--ink)',textDecoration:'none',transform:'skew(-6deg)',
  display:'inline-block'
};


// ==========

function Hero({ variant = 'gradient' }) {
  const bgs = {
    gradient: { background: 'var(--grad-hero)' },
    vhs: { background: 'var(--grad-vhs)' },
    paper: { background: 'var(--paper)' }
  };
  const txtColor = variant === 'paper' ? 'var(--ink)' : '#fff';
  const subColor = variant === 'paper' ? 'var(--fg2)' : 'var(--cyan)';

  return (
    <section style={{...bgs[variant], borderBottom:'3px solid var(--ink)', position:'relative', overflow:'hidden'}}>
      {/* grain overlay */}
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle at 1px 1px, rgba(255,255,255,0.08) 1px, transparent 0)',backgroundSize:'4px 4px',pointerEvents:'none'}}/>
      {/* burst decoration */}
      <img src="../../assets/marks/burst.svg" style={{position:'absolute',top:40,right:80,width:100,transform:'rotate(15deg)'}}/>
      <img src="../../assets/marks/burst.svg" style={{position:'absolute',bottom:50,left:60,width:60,transform:'rotate(-20deg)',opacity:0.8}}/>

      <div style={{maxWidth:1280,margin:'0 auto',padding:'100px 40px 120px',position:'relative'}}>
        <div style={{fontFamily:'var(--font-pixel)',fontSize:12,letterSpacing:'0.3em',color:subColor,marginBottom:20}}>
          〜 ADVENTURE VARIETY UNIT 〜
        </div>
        {variant === 'paper' ? (
          <h1 style={{fontFamily:'var(--font-brush)',fontSize:120,margin:0,color:'var(--ink)',lineHeight:0.95}}>面白い活動</h1>
        ) : (
          <h1 style={{fontFamily:'var(--font-display)',fontSize:132,margin:0,lineHeight:0.95,color:'#fff',textShadow:'var(--text-stroke-ink), 8px 8px 0 var(--ink)'}}>面白い活動</h1>
        )}
        <p style={{fontFamily:'var(--font-sans)',fontSize:22,color:txtColor,marginTop:28,maxWidth:640,lineHeight:1.6,fontWeight:500}}>
          二人で、適当に、でも全力で。<br/>
          日常と旅の途中をYouTubeに上げてます。
        </p>
        <div style={{display:'flex',gap:16,marginTop:44,alignItems:'center'}}>
          <a href="#videos" style={{fontFamily:'var(--font-display)',fontSize:18,background:'var(--yellow)',color:'var(--ink)',padding:'16px 28px',border:'3px solid var(--ink)',borderRadius:10,boxShadow:'6px 6px 0 var(--ink)',textDecoration:'none',transform:'skew(-6deg)',display:'inline-block'}}>
            <span style={{display:'inline-block',transform:'skew(6deg)'}}>WATCH NOW ▶</span>
          </a>
          <div style={{fontFamily:'var(--font-pixel)',fontSize:11,letterSpacing:'0.2em',color:subColor}}>
            ● LIVE · 毎週金曜更新
          </div>
        </div>
      </div>
    </section>
  );
}


// ==========

const EPISODES = [
  { ep: '004', title: '沖縄・那覇の裏通り', dur: '18:22', date: '2026.04.12', grad: 'linear-gradient(135deg,#FF6A1F,#FF2E88)' },
  { ep: '003', title: '深夜のドンキ、何でもある説', dur: '09:45', date: '2026.04.05', grad: 'linear-gradient(135deg,#9B4CFF,#22E8FF)' },
  { ep: '002', title: '東北ローカル線で北上', dur: '24:08', date: '2026.03.29', grad: 'linear-gradient(135deg,#22E8FF,#B6FF3C)' },
  { ep: '001', title: 'とりあえず、北海道', dur: '12:34', date: '2026.03.22', grad: 'linear-gradient(135deg,#FFD63A,#FF2E88)' }
];

function VideoCard({ ep, title, dur, date, grad, feature }) {
  return (
    <a href="#" style={{textDecoration:'none',color:'inherit',display:'block'}}>
      <article style={{background:'var(--paper)',border:'2px solid var(--ink)',borderRadius:14,boxShadow:feature?'8px 8px 0 var(--magenta)':'6px 6px 0 var(--ink)',overflow:'hidden',transition:'transform 160ms cubic-bezier(.2,.9,.3,1.2)'}}
        onMouseEnter={e=>e.currentTarget.style.transform='translate(-3px,-3px)'}
        onMouseLeave={e=>e.currentTarget.style.transform='translate(0,0)'}>
        <div style={{aspectRatio:'16/9',background:grad,position:'relative',borderBottom:'2px solid var(--ink)'}}>
          <div style={{position:'absolute',top:10,left:10,fontFamily:'var(--font-pixel)',fontSize:10,letterSpacing:'0.2em',background:'var(--ink)',color:'#fff',padding:'3px 8px',borderRadius:2}}>EP.{ep}</div>
          <div style={{position:'absolute',top:10,right:10,fontFamily:'var(--font-pixel)',fontSize:11,background:'var(--ink)',color:'#fff',padding:'3px 8px',borderRadius:2}}>{dur}</div>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{width:72,height:72,borderRadius:'50%',background:'var(--ink)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,border:'3px solid #fff',boxShadow:'4px 4px 0 rgba(0,0,0,0.3)'}}>▶</div>
          </div>
        </div>
        <div style={{padding:'14px 16px'}}>
          <div style={{fontFamily:'var(--font-pixel)',fontSize:10,letterSpacing:'0.2em',color:'var(--fg3)',marginBottom:6}}>{date}</div>
          <h3 style={{fontFamily:'var(--font-display)',fontSize:22,margin:0,lineHeight:1.15}}>{title}</h3>
        </div>
      </article>
    </a>
  );
}

function VideoGrid() {
  return (
    <section id="videos" style={{background:'var(--paper)',padding:'80px 0',borderBottom:'3px solid var(--ink)'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 40px'}}>
        <div style={{display:'flex',alignItems:'end',gap:20,marginBottom:40}}>
          <img src="../../assets/marks/telop-ribbon.svg" style={{height:64,transform:'rotate(-3deg)'}}/>
          <div style={{flex:1}}/>
          <a href="https://youtube.com" style={{fontFamily:'var(--font-display)',fontSize:14,color:'var(--ink)',textDecoration:'none',borderBottom:'2px solid var(--ink)'}}>ALL VIDEOS →</a>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))',gap:24}}>
          {EPISODES.map((e, i) => <VideoCard key={e.ep} {...e} feature={i===0}/>)}
        </div>
      </div>
    </section>
  );
}


// ==========

const SOCIALS = [
  { name: 'YouTube', handle: '@面白い活動', color: '#FF2D2D', url: 'https://youtube.com/@omoshiroi', icon:'youtube' },
  { name: 'X', handle: '@placeholder', color: '#0E0B1F', url: '#', icon:'x' },
  { name: 'Instagram', handle: '@placeholder', color: '#FF2E88', url: '#', icon:'instagram' },
  { name: 'TikTok', handle: '@placeholder', color: '#22E8FF', url: '#', icon:'tiktok' }
];

function SnsPanel() {
  return (
    <section id="sns" style={{background:'var(--ink)',color:'var(--paper)',padding:'100px 0',position:'relative',overflow:'hidden',borderBottom:'3px solid var(--ink)'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle at 1px 1px, rgba(155,76,255,0.15) 1px, transparent 0)',backgroundSize:'6px 6px'}}/>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 40px',position:'relative'}}>
        <div style={{fontFamily:'var(--font-pixel)',fontSize:12,letterSpacing:'0.3em',color:'var(--cyan)',marginBottom:16}}>〜 FOLLOW US 〜</div>
        <h2 style={{fontFamily:'var(--font-display)',fontSize:72,margin:'0 0 48px',color:'#fff',textShadow:'4px 4px 0 var(--magenta)',lineHeight:1}}>
          追っかけて<br/>
          <span style={{color:'var(--yellow)',textShadow:'4px 4px 0 var(--violet)'}}>ください！！</span>
        </h2>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(240px, 1fr))',gap:20}}>
          {SOCIALS.map(s => (
            <a key={s.name} href={s.url} target="_blank" style={{textDecoration:'none',color:'inherit'}}>
              <div style={{background:'var(--ink-soft)',border:'2px solid var(--violet)',borderRadius:14,padding:'28px 24px',boxShadow:'6px 6px 0 var(--magenta)',display:'flex',alignItems:'center',gap:16,transition:'all 160ms cubic-bezier(.2,.9,.3,1.2)'}}
                onMouseEnter={e=>{e.currentTarget.style.transform='translate(-3px,-3px)';e.currentTarget.style.boxShadow='9px 9px 0 var(--magenta)'}}
                onMouseLeave={e=>{e.currentTarget.style.transform='translate(0,0)';e.currentTarget.style.boxShadow='6px 6px 0 var(--magenta)'}}>
                <div style={{width:56,height:56,borderRadius:12,background:s.color,border:'2px solid var(--paper)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <img src={`../../assets/icons/social/${s.icon}.svg`} style={{width:32,height:32,filter:s.color==='#0E0B1F'?'invert(1)':'brightness(0) invert(1)'}}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'var(--font-display)',fontSize:22,lineHeight:1}}>{s.name}</div>
                  <div style={{fontFamily:'var(--font-pixel)',fontSize:11,letterSpacing:'0.12em',color:'var(--fg2-dark)',marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.handle}</div>
                </div>
                <div style={{fontFamily:'var(--font-display)',fontSize:20,color:'var(--cyan)'}}>→</div>
              </div>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}


// ==========

function Footer() {
  return (
    <footer style={{background:'var(--paper)',padding:'48px 0',position:'relative'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 40px',display:'flex',alignItems:'center',gap:32,flexWrap:'wrap'}}>
        <img src="../../assets/marks/stamp.svg" style={{width:80,height:80}}/>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontFamily:'var(--font-display)',fontSize:24}}>面白い活動</div>
          <div style={{fontFamily:'var(--font-pixel)',fontSize:10,letterSpacing:'0.25em',color:'var(--fg3)',marginTop:4}}>OMOSHIROI KATSUDOU · SINCE 2026</div>
        </div>
        <div style={{fontFamily:'var(--font-pixel)',fontSize:11,letterSpacing:'0.15em',color:'var(--fg2)'}}>
          © 2026 面白い活動. ALL RIGHTS... 適当.
        </div>
      </div>
    </footer>
  );
}


const TWEAKS = /*EDITMODE-BEGIN*/{
  "heroVariant": "gradient"
}/*EDITMODE-END*/;

function App() {
  const [variant, setVariant] = React.useState(TWEAKS.heroVariant);
  React.useEffect(() => {
    const sel = document.getElementById('heroVariant');
    if (sel) {
      sel.value = variant;
      sel.onchange = e => {
        setVariant(e.target.value);
        window.parent.postMessage({ type:'__edit_mode_set_keys', edits: { heroVariant: e.target.value }}, '*');
      };
    }
  }, [variant]);
  return (
    <>
      <Nav/>
      <Hero variant={variant}/>
      <VideoGrid/>
      <SnsPanel/>
      <Footer/>
    </>
  );
}

// Tweaks wiring
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('on');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('on');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

// give babel a tick to process all the script tags
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}, 100);

</script>
