<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.btn{font-family:var(--font-display);font-size:16px;padding:12px 22px;border:2px solid var(--ink);border-radius:var(--r-2);box-shadow:var(--shadow-hard);cursor:pointer;background:var(--paper);color:var(--ink);letter-spacing:.02em;transition:all 120ms cubic-bezier(.2,.9,.3,1.2)}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);background:var(--yellow)}
.btn.primary{background:var(--magenta);color:#fff;text-shadow:var(--text-stroke-ink)}
.btn.primary:hover{background:var(--yellow);color:var(--ink);text-shadow:none}
.btn.ghost{background:transparent;box-shadow:none}
.btn.ghost:hover{background:var(--ink);color:var(--paper);box-shadow:none;transform:none}
.btn.telop{background:var(--grad-ribbon);color:#fff;text-shadow:var(--text-stroke-ink);transform:skew(-6deg)}
.btn.telop span{display:inline-block;transform:skew(6deg)}
</style></head><body><div class="card"><div class="row" style="gap:14px">
<button class="btn primary">WATCH NOW ▶</button>
<button class="btn">もっと見る</button>
<button class="btn ghost">SKIP</button>
<button class="btn telop"><span>LET'S GO !!</span></button>
</div></div></body></html>
