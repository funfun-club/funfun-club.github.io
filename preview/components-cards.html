<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.card-sm{background:var(--paper);border:2px solid var(--ink);border-radius:var(--r-3);padding:14px;box-shadow:var(--shadow-hard);flex:1;min-width:180px}
.card-sm.feature{box-shadow:var(--shadow-hard-lg);border-width:3px}
.card-sm.cyan{box-shadow:var(--shadow-cyan)}
.card-sm.magenta{box-shadow:var(--shadow-magenta)}
.t{font-family:var(--font-display);font-size:18px;line-height:1;margin-bottom:6px}
.s{font-size:12px;color:var(--fg2);line-height:1.4}
</style></head><body><div class="card"><div class="row" style="gap:14px;align-items:stretch">
<div class="card-sm"><div class="t">ノーマル</div><div class="s">hard-offset 4px shadow</div></div>
<div class="card-sm feature"><div class="t">FEATURE</div><div class="s">8px shadow, 3px border</div></div>
<div class="card-sm cyan"><div class="t">CYAN POP</div><div class="s">colored offset shadow</div></div>
<div class="card-sm magenta"><div class="t">MAGENTA</div><div class="s">for hero cards</div></div>
</div></div></body></html>
