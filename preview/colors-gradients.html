<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grad { flex: 1; min-width: 140px; height: 120px; border: 2px solid var(--ink); border-radius: var(--r-2); box-shadow: var(--shadow-hard); display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }
.tag { display: inline-block; align-self: flex-start; font-family: var(--font-pixel); font-size: 10px; letter-spacing: 0.12em; color: var(--ink); background: var(--paper); padding: 4px 8px; border: 2px solid var(--ink); border-radius: 4px; }
.name { font-family: var(--font-display); font-size: 15px; color: var(--ink); background: var(--paper); padding: 4px 8px; border: 2px solid var(--ink); border-radius: 4px; align-self: flex-start; }
</style></head><body><div class="card"><div class="row" style="gap:10px">
<div class="grad" style="background: var(--grad-hero)"><span class="tag">HERO</span><span class="name">--grad-hero</span></div>
<div class="grad" style="background: var(--grad-ribbon)"><span class="tag">RIBBON</span><span class="name">--grad-ribbon</span></div>
<div class="grad" style="background: var(--grad-sunset)"><span class="tag">SUNSET</span><span class="name">--grad-sunset</span></div>
<div class="grad" style="background: var(--grad-vhs)"><span class="tag">VHS</span><span class="name">--grad-vhs</span></div>
</div></div></body></html>
