<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.v{background:var(--ink);border:2px solid var(--ink);border-radius:var(--r-3);box-shadow:var(--shadow-hard);aspect-ratio:16/9;width:260px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:10px;color:var(--paper);background-image:linear-gradient(135deg,#9B4CFF,#FF2E88,#22E8FF);flex-shrink:0}
.v::before{content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#fff;text-shadow:var(--text-stroke-ink)}
.v .dur{position:absolute;top:8px;right:10px;font-family:var(--font-pixel);font-size:11px;background:var(--ink);padding:2px 6px;border-radius:2px;letter-spacing:.1em}
.v .tt{font-family:var(--font-display);font-size:16px;line-height:1.1;text-shadow:var(--text-stroke-ink)}
.meta{display:flex;flex-direction:column;gap:6px}
.ep{font-family:var(--font-pixel);font-size:10px;letter-spacing:.2em;color:var(--fg2)}
.tt2{font-family:var(--font-display);font-size:20px;line-height:1.1}
</style></head><body><div class="card"><div class="row" style="gap:18px;align-items:center">
<div class="v"><div class="dur">12:34</div><div class="tt">#001 北海道</div></div>
<div class="meta">
  <div class="ep">EPISODE 001 · 2026.04.15</div>
  <div class="tt2">とりあえず、北海道</div>
  <div style="font-size:13px;color:var(--fg2);max-width:260px;line-height:1.5">初回から飛行機チケット買ってないことに気づく。どうする。</div>
</div>
</div></div></body></html>
