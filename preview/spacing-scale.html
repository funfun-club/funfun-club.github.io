<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.sp{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.bar{background:var(--magenta);height:18px;border:2px solid var(--ink);border-radius:2px}
.tok{font-family:var(--font-pixel);font-size:11px;letter-spacing:.1em;width:70px;color:var(--fg2)}
.val{font-family:var(--font-mono);font-size:12px;color:var(--fg1);margin-left:auto}
</style></head><body><div class="card">
<div class="sp"><div class="tok">--s-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
<div class="sp"><div class="tok">--s-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
<div class="sp"><div class="tok">--s-5</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
<div class="sp"><div class="tok">--s-6</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
<div class="sp"><div class="tok">--s-7</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
<div class="sp"><div class="tok">--s-8</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
</div></body></html>
