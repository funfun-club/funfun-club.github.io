<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.bx{width:100px;height:80px;background:var(--paper);border:2px solid var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-pixel);font-size:10px;letter-spacing:.08em}
.hard{box-shadow:var(--shadow-hard)}
.hardlg{box-shadow:var(--shadow-hard-lg)}
.cy{box-shadow:var(--shadow-cyan)}
.mg{box-shadow:var(--shadow-magenta)}
.glow{box-shadow:var(--shadow-glow);background:var(--ink);color:var(--paper);border-color:var(--violet)}
</style></head><body><div class="card"><div class="row" style="gap:20px;align-items:flex-start">
<div class="bx hard">HARD</div>
<div class="bx hardlg">HARD-LG</div>
<div class="bx cy">CYAN</div>
<div class="bx mg">MAGENTA</div>
<div class="bx glow">GLOW</div>
</div></div></body></html>
