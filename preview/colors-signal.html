<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>

<div class="swatch" style="background:#B6FF3C"><div class="name">LIME</div><div class="hex">#B6FF3C</div></div>
<div class="swatch" style="background:#FF6A1F"><div class="name">ORANGE</div><div class="hex">#FF6A1F</div></div>
<div class="swatch dark" style="background:#FF2D2D"><div class="name">RED</div><div class="hex">#FF2D2D</div></div>
